name: Test Cancel on Violation

# Verifies cancel_on_violation without making this verifier workflow report as
# cancelled. Each matrix entry dispatches a target workflow that should cancel
# itself when the daemon sees a whitelist violation.

on:
  workflow_dispatch:
    inputs:
      target_mode:
        description: "Internal target mode. Leave as verifier for normal runs."
        required: false
        default: verifier
        type: choice
        options:
          - verifier
          - connected
          - disconnected
      parent_run_id:
        description: "Verifier workflow run id"
        required: false
        type: string
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'action.yml'
      - '.github/workflows/test_cancel_on_violation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target_mode || 'verifier' }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  verify-cancellation:
    name: Verify cancellation (${{ matrix.mode }})
    if: github.event_name != 'workflow_dispatch' || inputs.target_mode == 'verifier'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mode:
          - connected
          - disconnected
    steps:
      - name: Trigger cancellation target
        id: trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ matrix.mode }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          PARENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          workflow=".github/workflows/test_cancel_on_violation.yml"
          latest_before="$(gh run list --repo "$REPO" --workflow "$workflow" --branch "$BRANCH" --limit 1 --json databaseId --jq '.[0].databaseId // ""')"
          gh workflow run "$workflow" --repo "$REPO" --ref "$BRANCH" \
            -f target_mode="$MODE" \
            -f parent_run_id="$PARENT_RUN_ID"

          target_run_id=""
          for _ in {1..30}; do
            sleep 2
            latest_after="$(gh run list --repo "$REPO" --workflow "$workflow" --branch "$BRANCH" --limit 1 --json databaseId --jq '.[0].databaseId // ""')"
            if [[ -n "$latest_after" && "$latest_after" != "$latest_before" ]]; then
              target_run_id="$latest_after"
              break
            fi
          done

          if [[ -z "$target_run_id" ]]; then
            echo "Failed to detect target workflow run for mode=$MODE"
            exit 1
          fi

          echo "target_run_id=$target_run_id" >> "$GITHUB_OUTPUT"
          echo "Target run: https://github.com/$REPO/actions/runs/$target_run_id"

      - name: Wait for target cancellation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TARGET_RUN_ID: ${{ steps.trigger.outputs.target_run_id }}
        run: |
          set -euo pipefail
          conclusion=""
          for _ in {1..80}; do
            status="$(gh run view "$TARGET_RUN_ID" --repo "$REPO" --json status --jq '.status')"
            conclusion="$(gh run view "$TARGET_RUN_ID" --repo "$REPO" --json conclusion --jq '.conclusion // ""')"
            echo "target status=$status conclusion=$conclusion"
            if [[ "$status" == "completed" ]]; then
              break
            fi
            sleep 10
          done

          if [[ "$conclusion" != "cancelled" ]]; then
            echo "Expected target run to be cancelled, got conclusion=$conclusion"
            gh run view "$TARGET_RUN_ID" --repo "$REPO" --log || true
            exit 1
          fi

          echo "Target run cancelled as expected."

  cancel-target:
    name: Cancellation target (${{ inputs.target_mode }})
    if: github.event_name == 'workflow_dispatch' && inputs.target_mode != 'verifier'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup EDAMAME Posture with cancel_on_violation (connected)
        if: inputs.target_mode == 'connected'
        uses: ./
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}_cancel_target_connected
          network_scan: true
          packet_capture: true
          whitelist: github_ubuntu
          check_whitelist: true
          cancel_on_violation: true
          display_logs: true

      - name: Setup EDAMAME Posture with cancel_on_violation (disconnected)
        if: inputs.target_mode == 'disconnected'
        uses: ./
        with:
          disconnected_mode: true
          network_scan: true
          packet_capture: true
          whitelist: github_ubuntu
          check_whitelist: true
          cancel_on_violation: true
          display_logs: true

      - name: Debug cancellation setup
        run: |
          echo "target_mode=${{ inputs.target_mode }}"
          echo "parent_run_id=${{ inputs.parent_run_id }}"
          echo "target_run_id=${{ github.run_id }}"
          echo "HOME=$HOME"
          ls -la "$HOME/cancel_pipeline.sh" 2>&1 || echo "cancel_pipeline.sh not found"
          $EDAMAME_POSTURE_CMD status || echo "Daemon not responding"
          $EDAMAME_POSTURE_CMD logs 2>&1 | grep -iE "CI/CD|cancel|environment" | head -20 || true

      - name: Generate whitelist violation and wait for self-cancellation
        run: |
          set -euo pipefail
          echo "Waiting for daemon to stabilize..."
          sleep 60

          echo "Generating unauthorized network connection."
          curl -s --max-time 5 https://example.com > /dev/null || true

          echo "Waiting for EDAMAME to cancel this target run..."
          for attempt in {1..12}; do
            echo "poll=$attempt"
            $EDAMAME_POSTURE_CMD get-sessions || true
            $EDAMAME_POSTURE_CMD logs 2>&1 | tail -80 || true
            sleep 15
          done

          echo "cancel_on_violation did not cancel the target run."
          exit 1

