name: Test Cancel on Violation

# Verifies that cancel_on_violation executes the configured cancellation hook
# when a whitelist violation is observed. The hook records local evidence instead
# of calling the GitHub Actions API, which is blocked from hosted runners by the
# organization's IP allow list.

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'action.yml'
      - '.github/workflows/test_cancel_on_violation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-cancellation-hook:
    name: Verify cancellation hook (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        mode:
          - connected
          - disconnected
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup EDAMAME Posture with cancel_on_violation (connected)
        if: matrix.mode == 'connected'
        uses: ./
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}_cancel_hook_connected
          network_scan: true
          packet_capture: true
          whitelist: github_ubuntu
          check_whitelist: true
          cancel_on_violation: true
          display_logs: true

      - name: Setup EDAMAME Posture with cancel_on_violation (disconnected)
        if: matrix.mode == 'disconnected'
        uses: ./
        with:
          disconnected_mode: true
          network_scan: true
          packet_capture: true
          whitelist: github_ubuntu
          check_whitelist: true
          cancel_on_violation: true
          display_logs: true

      - name: Replace cancellation hook with local recorder
        run: |
          set -euo pipefail
          marker="${RUNNER_TEMP:-/tmp}/cancel_hook_${{ matrix.mode }}_${{ github.run_id }}.log"
          runner_script="$HOME/cancel_pipeline.sh"
          root_script="/root/cancel_pipeline.sh"
          script_template="${RUNNER_TEMP:-/tmp}/cancel_pipeline_recorder.sh"
          : > "$marker"
          chmod 666 "$marker"
          cat > "$script_template" <<SH
          #!/bin/sh
          marker="$marker"
          {
            echo "HOOK_CALLED=1"
            echo "MODE=${{ matrix.mode }}"
            echo "RUN_ID=${{ github.run_id }}"
            echo "REASON=\${1:-}"
            date -u '+TIMESTAMP=%Y-%m-%dT%H:%M:%SZ'
          } >> "\$marker"
          sync 2>/dev/null || true
          exit 0
          SH
          chmod 700 "$script_template"
          cp "$script_template" "$runner_script"
          chmod 700 "$runner_script"
          sudo cp "$script_template" "$root_script"
          sudo chmod 700 "$root_script"
          {
            echo "marker=$marker"
            echo "runner_script=$runner_script"
            echo "root_script=$root_script"
          } >> "$GITHUB_ENV"
          ls -la "$runner_script"
          sudo ls -la "$root_script"

      - name: Generate violation and wait for hook
        run: |
          set -euo pipefail
          echo "Waiting for daemon to stabilize..."
          sleep 60

          echo "Generating unauthorized network connection."
          curl -s --max-time 5 https://example.com > /dev/null || true

          for attempt in {1..12}; do
            echo "poll=$attempt"
            $EDAMAME_POSTURE_CMD get-sessions || true
            $EDAMAME_POSTURE_CMD logs 2>&1 | grep -iE "cancel|violation|whitelist" | tail -80 || true
            if [[ -f "$marker" ]] && sudo grep -q "HOOK_CALLED=1" "$marker"; then
              echo "Cancellation hook executed."
              sudo cat "$marker"
              exit 0
            fi
            sleep 15
          done

          echo "Cancellation hook was not executed."
          echo "Runner script path: $runner_script"
          echo "Root script path: $root_script"
          ls -la "$runner_script" || true
          sudo ls -la "$root_script" || true
          sudo chmod a+r "$marker" 2>/dev/null || true
          $EDAMAME_POSTURE_CMD get-exceptions || true
          exit 1

      - name: Upload cancellation hook evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cancel-on-violation-${{ matrix.mode }}-${{ github.run_id }}
          path: |
            ${{ env.marker }}
          if-no-files-found: warn

