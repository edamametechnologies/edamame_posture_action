name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release (e.g. 1.1.0). Major must match the moving v1 tag."
        required: true
        type: string

permissions: write-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate semver and major-version match
        run: |
          set -euo pipefail
          v="${{ inputs.version }}"
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Not semver (X.Y.Z): $v"
            exit 1
          fi
          major="${v%%.*}"
          if [[ "$major" != "1" ]]; then
            echo "Major must be 1 (moving tag is v1); got $major"
            exit 1
          fi

      - name: Validate version not already published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "v${{ inputs.version }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Release v${{ inputs.version }} already exists. Bump version."
            exit 1
          fi

      - name: Validate CHANGELOG has entry for this version
        run: |
          set -euo pipefail
          if ! grep -qE "^## \[${{ inputs.version }}\]" CHANGELOG.md; then
            echo "CHANGELOG.md missing [${{ inputs.version }}] entry"
            exit 1
          fi

      - name: Assert test.yml green on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # NOTE: github-hosted runners are NOT in the edamametechnologies org IP
          # allow list, so direct calls to api.github.com from this step return
          # HTTP 403. Detect that case explicitly and degrade to a warning rather
          # than hard-failing -- the dispatcher of release.yml is already a
          # privileged human and is responsible for confirming test.yml is green
          # before invoking. Other validate steps (semver, not-already-published,
          # CHANGELOG entry) still hard-fail unconditionally.
          set +e
          out=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow test.yml \
            --branch ${{ github.ref_name }} \
            --commit ${{ github.sha }} \
            --limit 1 \
            --json conclusion --jq '.[0].conclusion // "missing"' 2>&1)
          rc=$?
          set -e
          if [[ $rc -ne 0 ]]; then
            if echo "$out" | grep -qiE "IP allow list|HTTP 403"; then
              echo "::warning::Org IP allow list blocked api.github.com call from this hosted runner."
              echo "::warning::Cannot enforce 'test.yml green on this SHA' from a github-hosted runner under edamametechnologies' IP allow list."
              echo "::warning::Dispatcher MUST visually verify test.yml is green on SHA ${{ github.sha }} before invoking release.yml."
              echo "Soft-passing the test.yml-green gate. Other validate checks remain enforced."
              exit 0
            fi
            echo "Unexpected error from gh run list (rc=$rc): $out"
            exit 1
          fi
          if [[ "$out" != "success" ]]; then
            echo "test.yml not green for SHA ${{ github.sha }} (got: $out)."
            echo "Push the change, wait for test.yml to complete on this SHA, then re-dispatch release."
            exit 1
          fi
          echo "OK: test.yml green on SHA ${{ github.sha }}"

  release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag immutable vX.Y.Z
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Force-update moving v1 tag
        run: |
          set -euo pipefail
          git tag -f v1
          git push origin -f v1

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          awk -v v="${{ inputs.version }}" '
            $0 ~ "^## \\["v"\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/notes.md
          if [[ ! -s /tmp/notes.md ]]; then
            echo "Extracted release notes are empty -- check CHANGELOG.md formatting"
            exit 1
          fi
          echo "--- extracted notes ---"
          cat /tmp/notes.md
          echo "--- end notes ---"

      - name: Create GitHub Release for vX.Y.Z
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Release v${{ inputs.version }}" \
            --notes-file /tmp/notes.md \
            --latest

      - name: Refresh GitHub Release for v1 (moving)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete v1 --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create v1 \
            --repo ${{ github.repository }} \
            --title "v1 (moving) -> v${{ inputs.version }}" \
            --notes "Currently points to [v${{ inputs.version }}](../releases/tag/v${{ inputs.version }})." \
            --target ${{ github.sha }} \
            --prerelease=false
